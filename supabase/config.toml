# Filum Supabase Configuration
# Auto-loaded by Supabase CLI on `supabase start` / `supabase link`
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "filum"

[api]
enabled = true
port = 54321
schemas = ["public", "auth", "storage"]
extra_search_path = ["public", "extensions"]

[db]
port = 54322
major_version = 15

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://*.vercel.app"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_confirmations = false
enable_autoconfirm = true

[storage]
enabled = true

[realtime]
enabled = true

[analytics]
enabled = false
